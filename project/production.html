</head>

<body>

<header>
<h1>Enter Crop Production</h1>
</header>

<div class="container">

<form id="productionForm">

<label>Farmer Name</label>
<input type="text" id="farmer" required>

<label>Crop Name</label>
<input type="text" id="crop" required>

<label>Quantity (kg)</label>

</form>
