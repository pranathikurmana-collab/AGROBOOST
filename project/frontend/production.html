<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgroBoost – Add Production</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <main class="main">
            <div class="topbar"><span class="page-title">Add Production</span></div>
            <div class="content">
                <div class="panel">
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Farmer Name</label>
                            <input type="text" id="p-farmer" placeholder="Enter farmer name">
                        </div>
                        <div class="form-group">
                            <label>Crop Name</label>
                            <input type="text" id="p-crop" placeholder="e.g. Rice, Wheat">
                            <small id="price-display"></small>
                        </div>
                        <div class="form-group">
                            <label>Quantity (kg)</label>
                            <input type="number" id="p-qty" placeholder="e.g. 750">
                        </div>
                    </div>
                    <button class="submit-btn" id="submitBtn">Submit Production</button>
                    <div class="success-msg" id="success-msg" style="display:none;">Added!</div>
                </div>
            </div>
        </main>
    </div>
    <script src="components.js"></script>
    <script>
        document.getElementById('p-crop').addEventListener('blur', async function() {
            const crop = this.value.trim();
            if (crop.length > 2) {
                const res = await fetch(`http://127.0.0.1:8000/get-price/${crop}`);
                const data = await res.json();
                document.getElementById('price-display').textContent = `Live Price: ₹${data.price}/kg`;
            }
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const farmer = document.getElementById('p-farmer').value;
            const crop = document.getElementById('p-crop').value;
            const quantity = document.getElementById('p-qty').value;
            const res = await fetch('http://127.0.0.1:8000/productions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ farmer, crop, quantity })
            });
            if (res.ok) location.reload();
        });
    </script>
</body>
</html>
