<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroBoost – Payments</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .wallet-card { background: linear-gradient(135deg, #386641 0%, #6a994e 100%); color: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        .balance-amount { font-size: 2.5rem; font-weight: 800; font-family: 'Syne'; }
        .txn-history { background: white; border-radius: 16px; padding: 20px; border: 1px solid #eee; }
        .txn-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
        .qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; }
    </style>
</head>
<body>

<div class="app">
    <main class="main">
        <div class="topbar"><span class="page-title">Wallet & Payments</span></div>
        <div class="content">
            <div class="wallet-card">
                <div class="balance-label">Total Earnings</div>
                <div class="balance-amount">₹<span id="wallet-balance">24,500</span></div>
                <button class="submit-btn" style="background: white; color: #386641; margin-top: 20px; border:none;" onclick="showQR()">Withdraw to Bank</button>
            </div>
            <div class="txn-history">
                <div class="txn-item">
                    <div><strong>Paddy Sale Payout</strong><br><small>Order #AB-9921</small></div>
                    <div style="color:#6a994e; font-weight:700">+ ₹17,750</div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="qrModal" class="qr-modal">
    <div class="modal-content">
        <h3>Withdraw Funds</h3>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=AgroBoostPayment" style="margin:20px 0">
        <button class="submit-btn" onclick="hideQR()">Cancel</button>
    </div>
</div>

<script src="components.js"></script>
<script>
    function showQR() { document.getElementById('qrModal').style.display = 'flex'; }
    function hideQR() { document.getElementById('qrModal').style.display = 'none'; }
</script>
</body>
</html>
