<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroBoost – Add Farmer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <main class="main">
        <div class="topbar"><span class="page-title">Add Farmer</span></div>
        <div class="content">
            <div class="form-page">
                <div class="section-hdr"><h2>Register a new farmer</h2></div>
                <div class="panel">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="f-name">Full Name</label>
                            <input type="text" id="f-name" placeholder="e.g. Ramesh Kumar" required>
                        </div>
                        <div class="form-group">
                            <label for="f-village">Village</label>
                            <input type="text" id="f-village" placeholder="e.g. Warangal" required>
                        </div>
                        <div class="form-group full">
                            <label for="f-phone">Phone Number</label>
                            <input type="text" id="f-phone" placeholder="+91 XXXXX XXXXX" required>
                        </div>
                    </div>
                    <div class="check-row">
                        <input type="checkbox" id="f-accept">
                        <label for="f-accept" style="font-size: 0.85rem;">I accept the AgroBoost policy</label>
                    </div>
                    <button class="submit-btn" id="submitBtn">Register Farmer</button>
                    <div class="success-msg" id="success-msg" style="display:none;">
                        Farmer registered successfully!
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="components.js"></script>
<script>
    document.getElementById('submitBtn').addEventListener('click', async function () {
        const name = document.getElementById('f-name').value.trim();
        const village = document.getElementById('f-village').value.trim();
        const phone = document.getElementById('f-phone').value.trim();
        const accept = document.getElementById('f-accept').checked;

        if (!name || !village || !phone) { alert('Please fill all fields.'); return; }
        if (!accept) { alert('Please accept the policy.'); return; }

        const response = await fetch('http://127.0.0.1:8000/farmers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, village, phone })
        });

        if (response.ok) {
            location.reload(); // Refresh to clear form
        }
    });
</script>
</body>
</html>
