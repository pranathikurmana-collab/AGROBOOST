<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgroBoost – Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <main class="main">
            <div class="topbar">
                <span class="page-title">Records</span>
                <button class="clear-btn" id="clearBtn">Clear all</button>
            </div>
            <div class="content">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Farmer</th><th>Crop</th><th>Quantity</th><th>Bonus</th><th>Action</th></tr>
                        </thead>
                        <tbody id="records-table"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="components.js"></script>
    <script>
        async function renderTable() {
            const res = await fetch('http://127.0.0.1:8000/records');
            const data = await res.json();
            const tbody = document.getElementById('records-table');
            tbody.innerHTML = data.map((p, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${p.farmer}</td>
                    <td>${p.crop}</td>
                    <td>${p.quantity} kg</td>
                    <td>₹${p.bonus}</td>
                    <td><button onclick="deleteEntry(${p.id})">Delete</button></td>
                </tr>`).join('');
        }
        async function deleteEntry(id) {
            if(confirm('Delete?')) {
                await fetch(`http://127.0.0.1:8000/records/${id}`, {method:'DELETE'});
                renderTable();
            }
        }
        renderTable();
    </script>
</body>
</html>
