<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroBoost – Production Records</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21H5.71C8 16.81 12 14 19 13L17 8Z"/><path d="M20.53 2C18.84 8 14.67 11.06 7 12L8.73 17C12.56 15.36 15.07 12.62 17 8L20.53 2Z"/></svg>
      </div>
      <h1>AgroBoost</h1>
      <p>Harvest meets opportunity</p>
    </div>
    <nav class="nav">
      <span class="nav-label">Menu</span>
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a>
      <a href="add_farmer.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V8H4v2H2v2h2v2h2v-2h2v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Add Farmer
      </a>
      <a href="production.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
        Add Production
      </a>
      <span class="nav-label" style="margin-top:.75rem">Records</span>
      <a href="records.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        Production Records
      </a>
    </nav>
    <div class="sidebar-footer"><p>AgroBoost v2.0 · 2025</p></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="page-title">Production Records</span>
      <div class="topbar-right">
        <button class="clear-btn" id="clearBtn">Clear all</button>
      </div>
    </div>

    <div class="content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Farmer Name</th>
              <th>Crop</th>
              <th>Quantity (kg)</th>
              <th>Bonus</th>
            </tr>
          </thead>
          <tbody id="records-table"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="script.js"></script>
<script>
  function renderTable() {
    const productions = JSON.parse(localStorage.getItem('agroboost_productions') || '[]');
    const tbody = document.getElementById('records-table');
    tbody.innerHTML = '';

    if (productions.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-row">No records yet. Add production to get started.</td></tr>';
      return;
    }

    [...productions].reverse().forEach((p, i) => {
      const row = tbody.insertRow();
      row.innerHTML = `
        <td style="color:#888780;font-size:.8rem">${productions.length - i}</td>
        <td style="font-weight:500">${p.farmer}</td>
        <td><span class="crop-pill">${p.crop}</span></td>
        <td>${p.quantity.toLocaleString()} kg</td>
        <td>${p.bonus > 0 ? `<span class="bonus-chip">₹${p.bonus.toLocaleString()}</span>` : '<span class="no-bonus">—</span>'}</td>
      `;
    });
  }

  document.getElementById('clearBtn').addEventListener('click', function () {
    if (confirm('Clear all production records? This cannot be undone.')) {
      localStorage.removeItem('agroboost_productions');
      renderTable();
    }
  });

  renderTable();
</script>

</body>
</html>
